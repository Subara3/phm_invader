<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Defend the O2 - Project Hail Mary Fan Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { border: 1px solid #333; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const PIX = 2;
const W = 400, H = 500;
canvas.width = W * PIX; canvas.height = H * PIX;
ctx.scale(PIX, PIX);
let SCALE = 1;

function resizeCanvas() {
  SCALE = Math.min((window.innerWidth - 10) / W, (window.innerHeight - 10) / H, 3);
  canvas.style.width = (W * SCALE) + 'px';
  canvas.style.height = (H * SCALE) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Audio
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function makeGain(vol, dur) {
  const g = audioCtx.createGain(); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  return { g, t };
}
const seCd = {};
function playSE(type) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const cd = { shoot: 3, hit: 2, beetle: 10, astrophage: 15, damage: 8, wave: 20 };
  if (cd[type] && seCd[type] && frame - seCd[type] < cd[type]) return;
  seCd[type] = frame;
  const t = audioCtx.currentTime;
  if (type === 'shoot') {
    const { g } = makeGain(0.08, 0.1);
    const o = audioCtx.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(800, t); o.frequency.exponentialRampToValueAtTime(400, t + 0.1);
    o.connect(g); o.start(t); o.stop(t + 0.1);
  } else if (type === 'hit') {
    const { g } = makeGain(0.1, 0.15);
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.15);
    o.connect(g); o.start(t); o.stop(t + 0.15);
  } else if (type === 'beetle') {
    const { g } = makeGain(0.07, 0.3);
    const o = audioCtx.createOscillator(); o.type = 'triangle';
    o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(1200, t + 0.15);
    o.frequency.exponentialRampToValueAtTime(600, t + 0.3);
    o.connect(g); o.start(t); o.stop(t + 0.3);
  } else if (type === 'astrophage') {
    [660, 880, 1100].forEach((f, i) => {
      const sg = audioCtx.createGain(); sg.connect(audioCtx.destination);
      sg.gain.setValueAtTime(0, t + i * 0.08); sg.gain.linearRampToValueAtTime(0.06, t + i * 0.08 + 0.02);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.15);
      const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      o.connect(sg); o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.15);
    });
  } else if (type === 'damage') {
    const { g } = makeGain(0.12, 0.3);
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
    o.connect(g); o.start(t); o.stop(t + 0.3);
  } else if (type === 'wave') {
    [440, 554, 659].forEach((f, i) => {
      const sg = audioCtx.createGain(); sg.connect(audioCtx.destination);
      sg.gain.setValueAtTime(0, t + i * 0.1); sg.gain.linearRampToValueAtTime(0.08, t + i * 0.1 + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
      const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      o.connect(sg); o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.3);
    });
  } else if (type === 'victory') {
    [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => {
      const sg = audioCtx.createGain(); sg.connect(audioCtx.destination);
      sg.gain.setValueAtTime(0, t + i * 0.15); sg.gain.linearRampToValueAtTime(0.1, t + i * 0.15 + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.5);
      const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      o.connect(sg); o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.5);
    });
  } else if (type === 'gameover') {
    [400, 350, 300, 200].forEach((f, i) => {
      const sg = audioCtx.createGain(); sg.connect(audioCtx.destination);
      sg.gain.setValueAtTime(0, t + i * 0.2); sg.gain.linearRampToValueAtTime(0.1, t + i * 0.2 + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.6);
      const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
      o.connect(sg); o.start(t + i * 0.2); o.stop(t + i * 0.2 + 0.6);
    });
  }
}

// Game state
let gameState = 'title';
let frame = 0;
let wave = 0;
let killCount = 0;
let astrophage = 3;
const MAX_ASTROPHAGE = 10;
let keys = {};
let mouseX = W / 2;
const isTouch = 'ontouchstart' in window;

// Player (Grace)
const player = { x: W / 2, y: H - 45, w: 20, h: 24, speed: 3, cooldown: 0 };
// Rocky (NPC ally)
const rocky = { x: W / 2 + 60, y: H - 45, vx: 0.8, ready: false, readyTimer: 0, readyInterval: 300 };
// O2 tanks
let o2tanks = [];
// Taumoeba
let taumoeba = [];
let tauDir = 1, tauSpeed = 0.3, tauDropTimer = 0;
// Bullets
let bullets = [];
// Beetles (sub-ships)
let beetles = [];
const MAX_BEETLES = 4;
let beetlesAvail = 4;
// Particles
let particles = [];
// Stars
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.5 + 0.5, b: Math.random()
}));

// Wave config
function getWaveConfig(w) {
  const rows = Math.min(2 + Math.floor(w / 10), 6);
  const cols = Math.min(5 + Math.floor(w / 15), 10);
  const hp = w >= 40 ? 2 : 1;
  const speed = 0.3 + w * 0.012;
  const shootChance = 0.001 + w * 0.0001;
  const diveChance = w >= 20 ? 0.0003 + (w - 20) * 0.00005 : 0;
  return { rows, cols, hp, speed, shootChance, diveChance };
}

function initO2() {
  o2tanks = [];
  for (let i = 0; i < 5; i++) {
    o2tanks.push({ x: 50 + i * 75, y: H - 75, hp: 4, maxHp: 4 });
  }
}

function spawnWave() {
  wave++;
  if (wave > 82) return;
  const cfg = getWaveConfig(wave);
  taumoeba = [];
  tauDir = 1;
  tauSpeed = cfg.speed;
  const startX = (W - cfg.cols * 30) / 2 + 15;
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      taumoeba.push({
        x: startX + c * 30, y: 30 + r * 25,
        hp: cfg.hp, maxHp: cfg.hp, phase: Math.random() * Math.PI * 2,
        diving: false, diveVy: 0, alive: true
      });
    }
  }
  playSE('wave');
}

function startGame() {
  gameState = 'game';
  frame = 0; wave = 0; killCount = 0; astrophage = 3;
  player.x = W / 2; player.cooldown = 0;
  rocky.x = W / 2 + 60; rocky.ready = false; rocky.readyTimer = 0;
  bullets = []; beetles = []; particles = [];
  beetlesAvail = MAX_BEETLES;
  for (const k in seCd) delete seCd[k];
  initO2();
  spawnWave();
}

// Drawing
function drawStars() {
  for (const s of stars) {
    const b = 0.3 + 0.7 * Math.sin(frame * 0.02 + s.b * 10);
    ctx.fillStyle = `rgba(255,255,255,${b})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
}

function drawPlayer(x, y) {
  ctx.save(); ctx.translate(Math.round(x), Math.round(y));
  // Helmet
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.arc(0, -8, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6cf';
  ctx.beginPath(); ctx.arc(0, -8, 6, Math.PI * 0.8, Math.PI * 2.2); ctx.fill();
  // Visor
  ctx.fillStyle = '#aef';
  ctx.beginPath(); ctx.arc(1, -9, 3.5, 0, Math.PI * 2); ctx.fill();
  // Body (white T-shirt / spacesuit)
  ctx.fillStyle = '#eee';
  ctx.fillRect(-7, -1, 14, 14);
  // Arms
  ctx.fillStyle = '#eee';
  ctx.fillRect(-10, 0, 4, 10);
  ctx.fillRect(6, 0, 4, 10);
  // Legs
  ctx.fillStyle = '#556';
  ctx.fillRect(-5, 13, 4, 6);
  ctx.fillRect(1, 13, 4, 6);
  // Skin
  ctx.fillStyle = '#fdb';
  ctx.fillRect(-9, 0, 3, 3);
  ctx.fillRect(6, 0, 3, 3);
  ctx.restore();
}

function drawRocky(x, y, ready) {
  ctx.save(); ctx.translate(Math.round(x), Math.round(y));
  const sc = 1.2;
  ctx.scale(sc, sc);
  // Body (brown Eridian - rocky shape)
  ctx.fillStyle = ready ? '#fa4' : '#a67040';
  ctx.beginPath(); ctx.ellipse(0, -4, 8, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Rocky texture
  ctx.fillStyle = ready ? '#fc6' : '#8a5a30';
  ctx.beginPath(); ctx.ellipse(0, -6, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
  // 5 legs
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    const lx = Math.cos(a) * 9;
    const ly = Math.sin(a) * 9 + 2;
    const wobble = Math.sin(frame * 0.1 + i) * 2;
    ctx.fillStyle = ready ? '#fa4' : '#a67040';
    ctx.beginPath();
    ctx.moveTo(lx * 0.5, ly * 0.5);
    ctx.lineTo(lx + wobble, ly + 4);
    ctx.lineTo(lx - 1 + wobble, ly + 4);
    ctx.fill();
  }
  // Top "hand" / appendage
  ctx.fillStyle = ready ? '#fc6' : '#8a5a30';
  ctx.beginPath(); ctx.arc(0, -14, 4, 0, Math.PI * 2); ctx.fill();
  // Glow if ready
  if (ready) {
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(frame * 0.15);
    ctx.fillStyle = '#fa4';
    ctx.beginPath(); ctx.arc(0, -4, 16, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Astrophage icon above
    ctx.fillStyle = '#f80';
    ctx.beginPath(); ctx.arc(0, -24, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fc0';
    ctx.beginPath(); ctx.arc(0, -24, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawTaumoeba(t) {
  ctx.save(); ctx.translate(Math.round(t.x), Math.round(t.y));
  const p = t.phase + frame * 0.05;
  // Amoeba body
  ctx.fillStyle = t.hp > 1 ? '#a040c0' : '#40c060';
  ctx.beginPath();
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const r = 8 + Math.sin(a * 3 + p) * 2 + Math.cos(a * 5 + p * 1.3) * 1.5;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  // Nucleus
  ctx.fillStyle = t.hp > 1 ? '#c060e0' : '#60e080';
  ctx.beginPath(); ctx.arc(Math.sin(p) * 2, Math.cos(p * 0.7) * 2, 3, 0, Math.PI * 2); ctx.fill();
  // Pseudopods
  ctx.strokeStyle = t.hp > 1 ? '#8030a0' : '#30a050';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2 + p * 0.3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 6, Math.sin(a) * 6);
    ctx.quadraticCurveTo(Math.cos(a + 0.5) * 14, Math.sin(a + 0.5) * 14,
      Math.cos(a + 1) * 10, Math.sin(a + 1) * 10);
    ctx.stroke();
  }
  ctx.restore();
}

function drawO2Tank(tank) {
  ctx.save(); ctx.translate(Math.round(tank.x), Math.round(tank.y));
  const ratio = tank.hp / tank.maxHp;
  // Tank body
  ctx.fillStyle = ratio > 0.5 ? '#4488ff' : ratio > 0.25 ? '#ff8844' : '#ff4444';
  ctx.beginPath();
  ctx.roundRect(-8, -12, 16, 24, 4);
  ctx.fill();
  // O2 label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('O2', 0, 2);
  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(-7, 14, 14, 3);
  ctx.fillStyle = ratio > 0.5 ? '#4f4' : ratio > 0.25 ? '#ff4' : '#f44';
  ctx.fillRect(-7, 14, 14 * ratio, 3);
  // Valve on top
  ctx.fillStyle = '#888';
  ctx.fillRect(-3, -15, 6, 4);
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(0, -16, 3, Math.PI, 0); ctx.fill();
  ctx.restore();
}

function drawBeetle(b) {
  ctx.save(); ctx.translate(Math.round(b.x), Math.round(b.y));
  ctx.rotate(b.angle || 0);
  // Small probe ship
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.moveTo(0, -5); ctx.lineTo(-4, 4); ctx.lineTo(4, 4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#88f';
  ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
  // Thrust
  ctx.fillStyle = `rgba(255,180,60,${0.5 + Math.random() * 0.5})`;
  ctx.beginPath(); ctx.moveTo(-2, 4); ctx.lineTo(0, 7 + Math.random() * 3); ctx.lineTo(2, 4); ctx.fill();
  ctx.restore();
}

function drawAstrophage(x, y, r) {
  ctx.save(); ctx.translate(x, y);
  const glow = 0.5 + 0.3 * Math.sin(frame * 0.1);
  ctx.globalAlpha = glow;
  ctx.fillStyle = '#f80';
  ctx.beginPath(); ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fa0';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff4';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHUD() {
  // Wave
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`WAVE ${wave}/82`, 8, 16);
  // Kill count
  ctx.fillText(`KILLS: ${killCount}`, 8, 30);
  // Astrophage
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fa0';
  ctx.fillText('ASTROPHAGE', W - 8, 16);
  for (let i = 0; i < MAX_ASTROPHAGE; i++) {
    if (i < astrophage) {
      drawAstrophage(W - 14 - i * 14, 28, 4);
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(W - 14 - i * 14, 28, 4, 0, Math.PI * 2); ctx.fill();
    }
  }
  // Beetles available
  ctx.textAlign = 'left';
  ctx.fillStyle = '#88f';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(`BEETLES: ${beetlesAvail}/${MAX_BEETLES}`, 8, H - 8);
  // Controls hint
  if (frame < 300) {
    ctx.globalAlpha = Math.max(0, 1 - frame / 300);
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(isTouch ? 'TAP to shoot | DOUBLE-TAP for beetle' : 'ARROWS/MOUSE move | Z shoot | X beetle', W / 2, H - 4);
    ctx.globalAlpha = 1;
  }
}

// Particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 2 + 0.5;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 20 + Math.random() * 20, color, size: Math.random() * 2 + 1
    });
  }
}

// Title screen
function drawTitle() {
  drawStars();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DEFEND THE O\u2082', W / 2, 130);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Project Hail Mary Fan Game', W / 2, 155);

  // O2 tanks illustration
  for (let i = 0; i < 5; i++) {
    drawO2Tank({ x: W / 2 - 60 + i * 30, y: 200, hp: 4, maxHp: 4 });
  }

  // Grace & Rocky
  drawPlayer(W / 2 - 30, 270);
  drawRocky(W / 2 + 30, 270, true);

  // Taumoeba sample
  for (let i = 0; i < 5; i++) {
    drawTaumoeba({ x: W / 2 - 50 + i * 25, y: 320, phase: i, hp: 1 });
  }

  ctx.fillStyle = '#4f4';
  ctx.font = 'bold 16px monospace';
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.fillText(isTouch ? 'TAP TO START' : 'PRESS SPACE TO START', W / 2, 400);
  }

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Survive 82 waves to save Erid!', W / 2, 430);
  ctx.fillText('Collect Astrophage from Rocky to launch Beetles', W / 2, 445);
}

// Game over
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 30px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('OXYGEN LOST', W / 2, 180);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`Reached Wave ${wave}`, W / 2, 220);
  ctx.fillText(`Taumoeba Eliminated: ${killCount}`, W / 2, 245);
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) ctx.fillText(isTouch ? 'TAP TO RETRY' : 'PRESS SPACE TO RETRY', W / 2, 300);
}

// Victory
let victoryPhase = 0;
function drawVictory() {
  victoryPhase++;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Celebration particles
  if (victoryPhase % 5 === 0) {
    spawnParticles(Math.random() * W, Math.random() * H * 0.5, `hsl(${Math.random()*360},80%,60%)`, 3);
  }

  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ERID IS SAVED!', W / 2, 150);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`All 82 waves cleared!`, W / 2, 190);
  ctx.fillText(`Taumoeba Eliminated: ${killCount}`, W / 2, 215);

  // Grace & Rocky together
  drawPlayer(W / 2 - 20, 280);
  drawRocky(W / 2 + 25, 278, true);

  // Speech bubble
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 80, 230, 160, 25, 6);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('"Good good good!"', W / 2, 246);

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) ctx.fillText(isTouch ? 'TAP TO RETURN' : 'PRESS SPACE TO RETURN', W / 2, 350);
}

// Update game
function update() {
  frame++;

  if (gameState !== 'game') return;

  // Player movement
  let dx = 0;
  if (keys['ArrowLeft'] || keys['a']) dx = -player.speed;
  if (keys['ArrowRight'] || keys['d']) dx = player.speed;
  if (!keys['ArrowLeft'] && !keys['ArrowRight'] && !keys['a'] && !keys['d']) {
    dx = (mouseX - player.x) * 0.1;
  }
  player.x = Math.max(15, Math.min(W - 15, player.x + dx));
  if (player.cooldown > 0) player.cooldown--;

  // Rocky AI
  rocky.readyTimer++;
  if (rocky.readyTimer >= rocky.readyInterval && !rocky.ready) {
    rocky.ready = true;
  }
  // Rocky wanders near player
  const targetX = player.x + 40 * Math.sin(frame * 0.01);
  rocky.x += (targetX - rocky.x) * 0.02;
  rocky.x = Math.max(20, Math.min(W - 20, rocky.x));

  // Collect Astrophage from Rocky
  if (rocky.ready && Math.abs(player.x - rocky.x) < 25) {
    rocky.ready = false;
    rocky.readyTimer = 0;
    astrophage = Math.min(MAX_ASTROPHAGE, astrophage + 1);
    playSE('astrophage');
    spawnParticles(rocky.x, rocky.y - 10, '#fa0', 8);
  }

  // Bullets
  for (const b of bullets) {
    b.x += b.vx; b.y += b.vy;
    if (b.type === 'tauShot') {
      // Taumoeba shots fall down
    }
  }
  bullets = bullets.filter(b => b.y > -10 && b.y < H + 10 && b.x > -10 && b.x < W + 10);

  // Beetle update
  for (const b of beetles) {
    b.timer--;
    if (b.timer <= 0) { b.alive = false; beetlesAvail = Math.min(MAX_BEETLES, beetlesAvail + 1); continue; }
    // Seek nearest taumoeba
    let nearest = null, minDist = Infinity;
    for (const t of taumoeba) {
      if (!t.alive) continue;
      const d = Math.hypot(t.x - b.x, t.y - b.y);
      if (d < minDist) { minDist = d; nearest = t; }
    }
    if (nearest) {
      const a = Math.atan2(nearest.y - b.y, nearest.x - b.x);
      b.vx += Math.cos(a) * 0.3;
      b.vy += Math.sin(a) * 0.3;
      b.angle = a + Math.PI / 2;
    }
    b.vx *= 0.95; b.vy *= 0.95;
    b.x += b.vx; b.y += b.vy;
    b.x = Math.max(5, Math.min(W - 5, b.x));
    b.y = Math.max(5, Math.min(H - 30, b.y));
    // Beetle hits taumoeba
    for (const t of taumoeba) {
      if (!t.alive) continue;
      if (Math.hypot(t.x - b.x, t.y - b.y) < 12) {
        t.hp--;
        if (t.hp <= 0) { t.alive = false; killCount++; spawnParticles(t.x, t.y, '#4f4', 6); playSE('hit'); }
        else { spawnParticles(t.x, t.y, '#ff0', 3); }
      }
    }
  }
  beetles = beetles.filter(b => b.alive);

  // Taumoeba movement
  const cfg = getWaveConfig(wave);
  let needDrop = false;
  for (const t of taumoeba) {
    if (!t.alive) continue;
    if (t.diving) {
      t.y += t.diveVy;
      t.diveVy += 0.05;
      // Hit O2 tanks while diving
      for (const tank of o2tanks) {
        if (tank.hp > 0 && Math.abs(t.x - tank.x) < 14 && Math.abs(t.y - tank.y) < 18) {
          tank.hp--;
          t.alive = false;
          killCount++;
          spawnParticles(tank.x, tank.y, '#f44', 8);
          playSE('damage');
        }
      }
      if (t.y > H + 10) { t.alive = false; }
      continue;
    }
    t.x += tauDir * tauSpeed;
    if (t.x < 15 || t.x > W - 15) needDrop = true;
    // Random dive
    if (cfg.diveChance > 0 && Math.random() < cfg.diveChance) {
      t.diving = true; t.diveVy = 1;
    }
  }
  if (needDrop) {
    tauDir *= -1;
    for (const t of taumoeba) {
      if (t.alive && !t.diving) t.y += 8;
    }
  }

  // Taumoeba shooting
  const aliveTau = taumoeba.filter(t => t.alive && !t.diving);
  if (aliveTau.length > 0 && Math.random() < cfg.shootChance * aliveTau.length) {
    const shooter = aliveTau[Math.floor(Math.random() * aliveTau.length)];
    bullets.push({ x: shooter.x, y: shooter.y + 8, vx: (Math.random() - 0.5) * 0.5, vy: 2 + wave * 0.02, type: 'tauShot' });
  }

  // Bullet-Taumoeba collision
  for (const b of bullets) {
    if (b.type !== 'n2') continue;
    for (const t of taumoeba) {
      if (!t.alive) continue;
      if (Math.abs(b.x - t.x) < 10 && Math.abs(b.y - t.y) < 10) {
        t.hp--;
        b.hit = true;
        if (t.hp <= 0) {
          t.alive = false; killCount++;
          spawnParticles(t.x, t.y, t.maxHp > 1 ? '#c060e0' : '#4f4', 6);
          playSE('hit');
        } else {
          spawnParticles(t.x, t.y, '#ff0', 3);
        }
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);

  // Taumoeba shots hit player/O2
  for (const b of bullets) {
    if (b.type !== 'tauShot') continue;
    // Hit O2 tanks
    for (const tank of o2tanks) {
      if (tank.hp > 0 && Math.abs(b.x - tank.x) < 12 && Math.abs(b.y - tank.y) < 16) {
        tank.hp--;
        b.hit = true;
        spawnParticles(tank.x, tank.y, '#f80', 4);
        playSE('damage');
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);

  // Taumoeba reach O2 tanks (non-diving)
  for (const t of taumoeba) {
    if (!t.alive || t.diving) continue;
    for (const tank of o2tanks) {
      if (tank.hp > 0 && Math.abs(t.x - tank.x) < 14 && t.y > tank.y - 15) {
        tank.hp--;
        t.alive = false; killCount++;
        spawnParticles(tank.x, tank.y, '#f44', 8);
        playSE('damage');
      }
    }
  }

  // Particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);

  // Check wave clear
  if (taumoeba.every(t => !t.alive)) {
    if (wave >= 82) {
      gameState = 'victory';
      victoryPhase = 0;
      playSE('victory');
    } else {
      spawnWave();
    }
  }

  // Check game over
  if (o2tanks.every(t => t.hp <= 0)) {
    gameState = 'gameover';
    playSE('gameover');
  }
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  // Draw O2 tanks
  for (const tank of o2tanks) {
    if (tank.hp > 0) drawO2Tank(tank);
    else {
      // Destroyed tank
      ctx.fillStyle = '#333';
      ctx.fillRect(tank.x - 8, tank.y - 12, 16, 24);
      ctx.fillStyle = '#555';
      ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText('X', tank.x, tank.y + 3);
    }
  }

  // Draw Taumoeba
  for (const t of taumoeba) {
    if (t.alive) drawTaumoeba(t);
  }

  // Draw bullets
  for (const b of bullets) {
    if (b.type === 'n2') {
      // N2 bullet
      ctx.fillStyle = '#8cf';
      ctx.fillRect(b.x - 1.5, b.y - 4, 3, 8);
      ctx.fillStyle = '#cef';
      ctx.fillRect(b.x - 0.5, b.y - 3, 1, 6);
      // N2 label
      ctx.fillStyle = '#adf';
      ctx.font = '5px monospace'; ctx.textAlign = 'center';
      ctx.fillText('N\u2082', b.x, b.y - 5);
    } else {
      // Taumoeba shot
      ctx.fillStyle = '#c44';
      ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f66';
      ctx.beginPath(); ctx.arc(b.x, b.y, 1, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Draw beetles
  for (const b of beetles) drawBeetle(b);

  // Draw Rocky
  drawRocky(rocky.x, rocky.y, rocky.ready);

  // Draw Player
  drawPlayer(player.x, player.y);

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'victory') drawVictory();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// Shoot N2
function shootN2() {
  if (player.cooldown > 0) return;
  bullets.push({ x: player.x, y: player.y - 14, vx: 0, vy: -5, type: 'n2' });
  player.cooldown = 10;
  playSE('shoot');
}

// Launch beetle
function launchBeetle() {
  if (beetlesAvail <= 0 || astrophage <= 0) return;
  astrophage--;
  beetlesAvail--;
  beetles.push({
    x: player.x, y: player.y - 10,
    vx: (Math.random() - 0.5) * 3, vy: -2,
    angle: 0, timer: 300 + wave * 3, alive: true
  });
  playSE('beetle');
}

// Input
let lastTap = 0;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left - canvas.clientLeft) / SCALE;
});

canvas.addEventListener('click', e => {
  initAudio();
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'gameover' || gameState === 'victory') { gameState = 'title'; return; }
  shootN2();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left - canvas.clientLeft) / SCALE;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left - canvas.clientLeft) / SCALE;
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'gameover' || gameState === 'victory') { gameState = 'title'; return; }
  const now = Date.now();
  if (now - lastTap < 300) { launchBeetle(); lastTap = 0; }
  else { shootN2(); lastTap = now; }
}, { passive: false });

document.addEventListener('keydown', e => {
  initAudio();
  keys[e.key] = true;
  if (gameState === 'title' && e.key === ' ') { startGame(); return; }
  if ((gameState === 'gameover' || gameState === 'victory') && (e.key === ' ' || e.key === 'Enter')) {
    gameState = 'title'; keys = {}; return;
  }
  if (gameState === 'game') {
    if (e.key === 'z' || e.key === 'Z' || e.key === ' ') shootN2();
    if (e.key === 'x' || e.key === 'X') launchBeetle();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
</script>
